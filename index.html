<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CineSearch</title>
  <link rel="stylesheet" href="cinemovie.css" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet"/>
</head>
<body>

  <div class="noise"></div>

  <header class="header">
    <div class="logo">CINE<span>SEARCH</span></div>
    <p class="tagline">Find any movie, instantly.</p>
  </header>

  <section class="search-section">
    <div class="search-wrap">
      <input type="text" class="js-search-input search-input" placeholder="Search for a movie..." />
      <button class="js-search-btn search-btn">Search</button>
    </div>
    <div class="js-error error hidden"></div>
  </section>

  <section class="results-section">
    <div class="js-results-count results-count hidden "></div>
    <div class="js-movies-grid movies-grid"></div>
  </section>



  <script type="module" src="cinemovie.js"></script>
</body>
</html>
